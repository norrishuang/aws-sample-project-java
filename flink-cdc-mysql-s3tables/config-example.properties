# MySQL CDC Source Configuration
mysql.hostname=your-mysql-host.rds.amazonaws.com
mysql.port=3306
mysql.username=flink_cdc
mysql.password=your-secure-password
mysql.database=testdb
mysql.table=user_order_list
mysql.server.timezone=UTC

# AWS S3 Tables / Iceberg REST Catalog Configuration
# REST Catalog endpoint (region-specific)
iceberg.rest.uri=https://s3tables.us-east-1.amazonaws.com/iceberg

# Warehouse ARN (format: arn:aws:s3tables:<region>:<accountID>:bucket/<bucketname>)
iceberg.warehouse.arn=arn:aws:s3tables:us-east-1:123456789012:bucket/my-s3tables-bucket

# Namespace (database) in S3 Tables
iceberg.namespace=my_namespace

# Target table name
iceberg.table.name=user_order_list

# AWS Region
aws.region=us-east-1

# Optional: AWS Account ID (for reference)
aws.account.id=123456789012
