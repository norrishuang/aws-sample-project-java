# ========================================
# AWS Glue Catalog 配置示例
# ========================================
# 这是使用 AWS Glue 作为 Iceberg Catalog 的推荐配置
# Glue Catalog 是 AWS 环境中最佳的元数据管理方案

# MySQL CDC Source Configuration
mysql.hostname=mysql.example.com
mysql.port=3306
mysql.username=admin
mysql.password=your-password
mysql.database=production_db
mysql.tables=orders,customers,products  # 或使用 .* 匹配所有表
mysql.server.timezone=UTC

# AWS Glue Catalog Configuration
iceberg.catalog.type=glue
iceberg.catalog.name=glue_catalog
iceberg.warehouse=s3://my-data-lake/iceberg-warehouse
iceberg.namespace=cdc_database  # Glue 数据库名称
iceberg.table.name=mysql_cdc_table

# AWS Configuration
aws.region=us-east-1

# Optional Glue Configuration
# iceberg.glue.catalog.id=123456789012  # 指定 AWS 账户 ID（默认使用当前账户）
# iceberg.glue.skip.name.validation=false  # 是否跳过 Glue 名称验证
# iceberg.glue.endpoint=https://glue.us-east-1.amazonaws.com  # 自定义 Glue 端点

# Optional S3 Configuration
# iceberg.s3.endpoint=  # 自定义 S3 端点（用于 LocalStack 或 MinIO）
# iceberg.s3.path.style.access=false  # 使用路径样式访问

# Flink Configuration
checkpoint.interval=300000  # 5 分钟

# Dynamic Sink Configuration
sink.parallelism=4  # 根据数据量调整
sink.upsert=true
sink.immediate.table.update=true  # 启用立即 schema 更新
sink.cache.max.size=100
sink.cache.refresh.ms=60000

# ========================================
# 使用说明
# ========================================
# 1. 确保 Flink 作业有以下 IAM 权限：
#    - glue:CreateDatabase, glue:GetDatabase
#    - glue:CreateTable, glue:GetTable, glue:UpdateTable
#    - s3:GetObject, s3:PutObject, s3:ListBucket
#
# 2. Glue 数据库会自动创建（如果不存在）
#
# 3. 表会自动创建并根据 CDC 事件演化 schema
#
# 4. 可以使用 AWS Athena 查询 Iceberg 表：
#    SELECT * FROM cdc_database.mysql_cdc_table;
#
# 5. 也可以使用 AWS Glue Studio、EMR、Redshift Spectrum 访问

# ========================================
# 与其他 AWS 服务集成
# ========================================
# - AWS Athena: 直接查询 Iceberg 表
# - AWS Glue ETL: 使用 Glue Job 处理数据
# - Amazon EMR: 使用 Spark 分析数据
# - Amazon Redshift Spectrum: 联邦查询
# - Amazon QuickSight: 可视化分析
