# S3 Tables 专用配置示例

# MySQL CDC Source
mysql.hostname=your-mysql-host
mysql.port=3306
mysql.username=root
mysql.password=your-password
mysql.database=salesdb
mysql.tables=.*
mysql.server.timezone=Asia/Shanghai

# S3 Tables Sink
sink.target=s3tables
s3tables.warehouse=arn:aws:s3tables:us-east-1:812046859005:bucket/iceberg-data-812046859005
aws.region=us-east-1
iceberg.catalog.name=s3tables_catalog
iceberg.namespace=salesdb

# 启用 upsert，避免 equality delete 文件爆炸（对有主键的表）
sink.upsert=true

# 写入并行度（适当调高加快写入）
sink.parallelism=4

# 目标文件大小与 S3 Tables Compaction 配置对齐（512MB）
sink.target.file.size.bytes=536870912

# Checkpoint 配置（10分钟间隔，减少 delete 文件产生频率）
checkpoint.interval=600000
checkpoint.timeout=600000
checkpoint.min.pause=60000
checkpoint.tolerable.failures=3
