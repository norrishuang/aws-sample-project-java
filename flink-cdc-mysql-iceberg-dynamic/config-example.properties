# MySQL CDC Source Configuration
mysql.hostname=localhost
mysql.port=3306
mysql.username=root
mysql.password=password
mysql.database=testdb
mysql.tables=.*
mysql.server.timezone=UTC

# Iceberg Catalog Configuration
# Catalog types: hadoop, hive, rest, glue
iceberg.catalog.type=hadoop
iceberg.catalog.name=iceberg_catalog
iceberg.warehouse=s3://my-bucket/warehouse
iceberg.namespace=default
iceberg.table.name=cdc_table
iceberg.branch=

# AWS Region (required for Glue, REST with SigV4, and S3)
aws.region=us-east-1

# For Hive Catalog
# iceberg.catalog.type=hive
# iceberg.hive.uri=thrift://localhost:9083

# For REST Catalog (e.g., AWS S3 Tables)
# iceberg.catalog.type=rest
# iceberg.rest.uri=https://s3tables.us-east-1.amazonaws.com/iceberg
# iceberg.rest.sigv4.enabled=true

# For AWS Glue Catalog (Recommended for AWS)
# iceberg.catalog.type=glue
# iceberg.glue.catalog.id=123456789012  # Optional: AWS account ID (defaults to current account)
# iceberg.glue.skip.name.validation=false  # Optional: Skip Glue name validation
# iceberg.glue.endpoint=  # Optional: Custom Glue endpoint (for VPC endpoints)

# S3 Configuration (Optional)
# iceberg.s3.endpoint=  # Optional: Custom S3 endpoint (for LocalStack/MinIO)
# iceberg.s3.path.style.access=false  # Optional: Use path-style access for S3

# Flink Configuration
checkpoint.interval=300000

# Dynamic Sink Configuration
sink.parallelism=2
sink.upsert=true
sink.immediate.table.update=true    # Key: Enable immediate schema updates
sink.cache.max.size=100              # Cache size for table metadata
sink.cache.refresh.ms=60000          # Cache refresh interval (ms)
